services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: staty
      POSTGRES_PASSWORD: staty
      POSTGRES_DB: staty_pilkarskie
    ports:
      - "5432:5432"
    volumes:
      - staty_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staty -d staty_pilkarskie"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  staty_postgres_data:
