name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: staty_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d staty_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/staty_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/staty_ci
      AUTH_SECRET: ci-secret-minimum-32-characters-long
      CI: true
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Pin npm
        run: npm install --global npm@11.6.2 --no-audit --no-fund

      - name: Show runtime versions
        run: |
          node --version
          npm --version
          npm config get registry

      - name: Validate lockfile registry
        shell: bash
        run: |
          if grep -E "internal\.api\.openai\.org|applied-caas-gateway" package-lock.json; then
            echo "package-lock.json contains a private registry URL"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        timeout-minutes: 8

      - name: Generate Prisma client
        run: npm run db:generate
        timeout-minutes: 4

      - name: Deploy migrations to clean PostgreSQL
        run: npm run db:deploy
        timeout-minutes: 4

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: PostgreSQL atomicity E2E
        run: npm run test:postgres
        timeout-minutes: 5

      - name: Build
        run: npm run build
        env:
          NEXT_BUILD_CPUS: "2"
          NEXT_SKIP_BUILD_TYPECHECK: "1"
        timeout-minutes: 8
