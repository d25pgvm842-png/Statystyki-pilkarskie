name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      AUTH_SECRET: ci-secret-minimum-32-characters-long
      CI: true
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Pin npm
        run: npm install --global npm@11.6.2 --no-audit --no-fund

      - name: Show runtime versions
        run: |
          node --version
          npm --version
          npm config get registry

      - name: Validate lockfile registry
        shell: bash
        run: |
          if grep -E "internal\.api\.openai\.org|applied-caas-gateway" package-lock.json; then
            echo "package-lock.json contains a private registry URL"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
        timeout-minutes: 8

      - name: Generate Prisma client
        run: npm run db:generate
        timeout-minutes: 4

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        timeout-minutes: 8

